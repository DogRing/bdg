name: Build and Push

on:
  push:
    branches: [ "main" ]
    paths:
      - "server/chess/**"
  pull_request:
    branches: [ "main" ]
    paths:
      - "server/chess/**"

env:
  REGISTRY: registry.dogring.kr
  IMAGE_NAME: chess-server
  IMAGE_TAG: 0.1.2

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Zot Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ZOT_USERNAME }}
          password: ${{ secrets.ZOT_PASSWORD }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=${{ env.IMAGE_TAG }}
            type=sha,prefix=,format=short
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}

      - name: Build and Push
        uses: docker/build-push-action@v5
        with:
          context: ./server/chess
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify Push
        if: github.event_name != 'pull_request'
        run: |
          echo "Pushed tags:"
          echo "${{ steps.meta.outputs.tags }}"
          echo ""
          echo "Catalog check:"
          curl -sf -u ${{ secrets.ZOT_USERNAME }}:${{ secrets.ZOT_PASSWORD }} \
            https://${{ env.REGISTRY }}/v2/_catalog | jq .
